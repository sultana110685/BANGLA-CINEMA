<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BanglaFlix - Bangla Cinema Platform</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#0b0b0b;
  color:white;
}

/* NAV */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#111;
  position:sticky;
  top:0;
}

.logo{
  color:red;
  font-size:22px;
  font-weight:bold;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

nav a:hover{
  color:red;
}

/* HERO */
.hero{
  height:85vh;
  background:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=80') center/cover;
  display:flex;
  align-items:flex-end;
  padding:60px;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(to top, black, transparent);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:600px;
}

.hero h1{
  font-size:42px;
}

.hero p{
  margin:10px 0;
  color:#ccc;
}

/* BUTTON */
.btn{
  padding:10px 15px;
  background:red;
  border:none;
  color:white;
  margin-right:10px;
  cursor:pointer;
  border-radius:4px;
}

/* ROW */
.row{
  padding:30px;
}

.row h2{
  margin-bottom:15px;
  color:red;
}

/* SCROLL ROW */
.row-posters{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding-bottom:10px;
}

.row-posters::-webkit-scrollbar{
  display:none;
}

.poster{
  min-width:170px;
  height:240px;
  border-radius:6px;
  overflow:hidden;
  transition:0.3s;
}

.poster:hover{
  transform:scale(1.08);
}

.poster img{
  width:100%;
  height:100%;
  object-fit:cover;
}

footer{
  text-align:center;
  padding:20px;
  background:#111;
  color:#777;
}
</style>
</head>

<body>

<header>
  <div class="logo">🎬 BanglaFlix</div>
  <nav>
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#actors">Actors</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Golden Era of Bangla Cinema</h1>
    <p>Explore legendary Bangla movies and timeless stars</p>
    <button class="btn">Watch Now</button>
    <button class="btn">Explore</button>
  </div>
</section>

<!-- MOVIES -->
<section class="row" id="movies">
  <h2>🎥 Popular Movies</h2>
  <div class="row-posters">

    <div class="poster">
      <img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?auto=format&fit=crop&w=400&q=80">
    </div>

    <div class="poster">
      <img src="https://images.unsplash.com/photo-1517602302552-471fe67acf66?auto=format&fit=crop&w=400&q=80">
    </div>

    <div class="poster">
      <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=400&q=80">
    </div>

    <div class="poster">
      <img src="https://images.unsplash.com/photo-1509347528160-9a9e33742cdb?auto=format&fit=crop&w=400&q=80">
    </div>

  </div>
</section>

<!-- ACTORS -->
<section class="row">
  <h2>🌟 Legendary Actors</h2>
  <div class="row-posters">

    <div class="poster">
      <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=400&q=80">
    </div>

    <div class="poster">
      <img src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39?auto=format&fit=crop&w=400&q=80">
    </div>

    <div class="poster">
      <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=400&q=80">
    </div>

  </div>
</section>

<!-- LEGENDS -->
<section class="row">
  <h2>🏆 Cinema Legends</h2>
  <div class="row-posters">

    <div class="poster">
      <img src="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?auto=format&fit=crop&w=400&q=80">
    </div>

    <div class="poster">
      <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=400&q=80">
    </div>

    <div class="poster">
      <img src="https://images.unsplash.com/photo-1520975922203-b2f9a0d12b3a?auto=format&fit=crop&w=400&q=80">
    </div>

  </div>
</section>

<footer>
  © 2026 BanglaFlix | Bangla Cinema Platform
</footer>

</body>
</html>
